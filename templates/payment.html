<!DOCTYPE html>
<html>
<head>
<title>Payment</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#f5f7fa;
margin:0;
padding:30px;
}

.container{
max-width:1200px;
margin:auto;
display:grid;
grid-template-columns:2fr 1fr;
gap:30px;
}

.left,.right{
background:white;
padding:25px;
border-radius:16px;
box-shadow:0 4px 16px rgba(0,0,0,.08);
}

.item{
display:flex;
gap:20px;
margin-bottom:20px;
padding-bottom:20px;
border-bottom:1px solid #eee;
}

.item img{
width:120px;
height:140px;
object-fit:contain;
border-radius:12px;
border:1px solid #ddd;
}

.total{
font-size:26px;
color:#1b8f4b;
font-weight:bold;
margin:20px 0;
}

button{
width:100%;
padding:16px;
border:none;
border-radius:12px;
font-size:16px;
cursor:pointer;
margin-top:15px;
color:white;
font-weight:bold;
}

.cod{
background:#ff6600;
}

.razor{
background:#1b8f4b;
}

@media(max-width:900px){

.container{
grid-template-columns:1fr;
}

body{
padding:15px;
}

}

</style>
</head>
<body>

<div class="container">

<div class="left">

<h2>Order Summary</h2>

{% for p in products %}

<div class="item">

<img src="{{ url_for('static', filename=p.images[0]) }}">

<div>
<h3>{{ p.name }}</h3>
<p>Qty : {{ p.quantity }}</p>
<p>₹ {{ p.price }}</p>
<p>Total : ₹ {{ p.price * p.quantity }}</p>
</div>

</div>

{% endfor %}

</div>


<div class="right">

<h2>Payment</h2>

<div class="total">
Grand Total : ₹{{ total }}
</div>

<a href="/payment-success/Cash On Delivery">
<button class="cod">
Cash On Delivery
</button>
</a>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<button class="razor" onclick="payNow()">
Pay With Razorpay
</button>

</div>

</div>

<script>
function payNow() {

    fetch("/create-razorpay-order", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            amount: "{{ total }}"
        })
    })
    .then(res => res.json())
    .then(order => {

        var options = {
            "key": "rzp_test_SpMXL5VFY8LN9c",
            "amount": order.amount,
            "currency": "INR",
            "name": "Akki Latest Collections",
            "description": "Order Payment",
            "order_id": order.id,

            // ✅ THIS ENABLES UPI, CARD, NETBANKING
            "method": {
                upi: true,
                card: true,
                netbanking: true,
                wallet: true
            },

            "prefill": {
                "name": "",
                "email": "",
                "contact": ""
            },

            "theme": {
                "color": "#1b8f4b"
            },

            "handler": function (response) {

                // Payment success
                window.location.href = "/payment-success/Online";
            }
        };

        var rzp = new Razorpay(options);
        rzp.open();
    });

}
</script>

</body>
</html>
