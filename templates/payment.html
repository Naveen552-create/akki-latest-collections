<!DOCTYPE html>
<html>
<head>
<title>Payment</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#f5f7fa;
margin:0;
padding:30px;
}

.container{
max-width:1200px;
margin:auto;
display:grid;
grid-template-columns:2fr 1fr;
gap:30px;
}

.left,.right{
background:white;
padding:25px;
border-radius:16px;
box-shadow:0 4px 16px rgba(0,0,0,.08);
}

.item{
display:flex;
gap:20px;
margin-bottom:20px;
padding-bottom:20px;
border-bottom:1px solid #eee;
}

.item img{
width:120px;
height:140px;
object-fit:contain;
border-radius:12px;
border:1px solid #ddd;
}

.total{
font-size:26px;
color:#1b8f4b;
font-weight:bold;
margin:20px 0;
}

.extra{
font-size:16px;
color:#ff6600;
margin-top:10px;
font-weight:bold;
}

.final-total{
font-size:30px;
color:#111;
margin-top:15px;
font-weight:bold;
}

button{
width:100%;
padding:16px;
border:none;
border-radius:12px;
font-size:16px;
cursor:pointer;
margin-top:15px;
color:white;
font-weight:bold;
}

.cod{
background:#ff6600;
}

.cashfree{
background:#1b8f4b;
}

@media(max-width:900px){

.container{
grid-template-columns:1fr;
}

body{
padding:15px;
}

.item{
flex-direction:column;
}

.item img{
width:100%;
height:250px;
}

}

</style>
</head>
<body>

<div class="container">

<!-- LEFT -->

<div class="left">

<h2>Order Summary</h2>

{% for p in products %}

<div class="item">

<img src="{{ url_for('static', filename=p.images[0]) }}">

<div>
<h3>{{ p.name }}</h3>

<p>
Qty : {{ p.quantity }}
</p>

<p>
Price : ₹ {{ p.price }}
</p>

<p>
Total : ₹ {{ p.price * p.quantity }}
</p>

</div>

</div>

{% endfor %}

</div>


<!-- RIGHT -->

<div class="right">

<h2>Payment</h2>

<div class="total">
Cart Total : ₹{{ total }}
</div>

<div class="extra">
Online Payment Charge : ₹3
</div>

<div class="final-total">
Final Total : ₹{{ total + 3 }}
</div>





<!-- CASHFREE -->

<script src="https://sdk.cashfree.com/js/v3/cashfree.js"></script>

<button class="cashfree" onclick="payNow()">
Pay Online
</button>

</div>

</div>

<script src="https://sdk.cashfree.com/js/v3/cashfree.js"></script>

<script>

async function payNow(){

    let finalAmount = Number("{{ total }}") + 3;

    try{

        const response = await fetch("/create-cashfree-order",{

            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify({
                amount:finalAmount
            })

        });

        const data = await response.json();

        if(data.error){

            alert(data.error);

            return;

        }

        const cashfree = Cashfree({

            mode:"production"

        });

        cashfree.checkout({

            paymentSessionId:data.payment_session_id,

            redirectTarget:"_self"

        });

    }

    catch(error){

        console.log(error);

        alert("Payment Failed");

    }

}

</script>

</body>
</html>
