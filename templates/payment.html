<!DOCTYPE html>
<html>
<head>

<title>Payment</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial;
background:#f5f7fa;
padding:30px;
}

.container{
max-width:1200px;
margin:auto;
display:grid;
grid-template-columns:2fr 1fr;
gap:30px;
}

.left,
.right{
background:white;
padding:25px;
border-radius:16px;
box-shadow:0 4px 16px rgba(0,0,0,.08);
}

.item{
display:flex;
gap:20px;
padding-bottom:20px;
margin-bottom:20px;
border-bottom:1px solid #eee;
}

.item img{
width:120px;
height:140px;
object-fit:contain;
border-radius:12px;
border:1px solid #ddd;
background:white;
}

.item h3{
font-size:18px;
margin-bottom:10px;
}

.item p{
margin:6px 0;
font-size:15px;
color:#555;
}

.summary-box{
margin-top:20px;
}

.summary-row{
display:flex;
justify-content:space-between;
margin-bottom:15px;
font-size:16px;
}

.summary-row.total{
font-size:28px;
font-weight:bold;
color:#111;
padding-top:15px;
border-top:2px solid #eee;
}

.green{
color:#1b8f4b;
font-weight:bold;
}

.orange{
color:#ff6600;
font-weight:bold;
}

button{
width:100%;
padding:16px;
border:none;
border-radius:12px;
font-size:16px;
font-weight:bold;
cursor:pointer;
margin-top:20px;
background:#1b8f4b;
color:white;
transition:.3s;
}

button:hover{
opacity:.9;
}

@media(max-width:900px){

.container{
grid-template-columns:1fr;
}

body{
padding:15px;
}

.item{
flex-direction:column;
}

.item img{
width:100%;
height:250px;
}

}

</style>

</head>
<body>

<div class="container">

<!-- LEFT -->

<div class="left">

<h2 style="margin-bottom:25px;">
Order Summary
</h2>

{% for p in products %}

<div class="item">

<img src="{{ url_for('static', filename=p.images[0]) if p.images else '' }}">

<div>

<h3>{{ p.name }}</h3>

<p>
Quantity :
<b>{{ p.quantity }}</b>
</p>

<p>
Price :
<b>₹{{ p.price }}</b>
</p>

<p>
Total :
<b class="green">
₹{{ p.price * p.quantity }}
</b>
</p>

</div>

</div>

{% endfor %}

</div>

<!-- RIGHT -->

<div class="right">

<h2 style="margin-bottom:25px;">
Payment Summary
</h2>

<div class="summary-box">

<div class="summary-row">
<span>Cart Total</span>
<span>₹{{ subtotal }}</span>
</div>

<div class="summary-row">
<span>Shipping Charge</span>
<span class="orange">
₹{{ shipping }}
</span>
</div>

<div class="summary-row">
<span>Online Payment Fee</span>
<span class="orange">
₹{{ platform_fee }}
</span>
</div>

<div class="summary-row total">
<span>Final Total</span>
<span class="green">
₹{{ total }}
</span>
</div>

</div>

<!-- CASHFREE BUTTON -->

<button onclick="payNow()">
Pay Online
</button>

</div>

</div>

<!-- CASHFREE SDK -->

<script src="https://sdk.cashfree.com/js/v3/cashfree.js"></script>

<script>

async function payNow(){

    // FINAL TOTAL FROM BACKEND
    let finalAmount = Number("{{ total }}");

    try{

        const response = await fetch("/create-cashfree-order",{

            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify({
                amount:finalAmount
            })

        });

        const data = await response.json();

        console.log(data);

        // ERROR
        if(data.error){

            alert(data.error);

            return;

        }

        // CASHFREE
        const cashfree = Cashfree({

            mode:"production"

        });

        cashfree.checkout({

            paymentSessionId:data.payment_session_id,

            redirectTarget:"_self"

        });

    }

    catch(error){

        console.log(error);

        alert("Payment Failed");

    }

}

</script>

</body>
</html>
