<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Edit Product</title>

<style>
body{font-family:Arial;background:#f5f7fa;}
.container{
max-width:800px;
margin:40px auto;
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 4px 12px rgba(0,0,0,.1);
}
input,textarea,select{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:8px;
box-sizing:border-box;
}
button{
width:100%;
padding:14px;
background:black;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}
.image-wrap{
display:flex;
gap:20px;
flex-wrap:wrap;
}
.image-box{
width:150px;
border:1px solid #ddd;
padding:10px;
border-radius:10px;
}
.image-box img{
width:100%;
height:130px;
object-fit:cover;
}
.size-box{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
}
</style>
</head>
<body>

<div class="container">

<a href="/manage-products">← Back</a>

<h2>Edit Product</h2>

<form method="POST" enctype="multipart/form-data">

<input type="text" name="name" value="{{product.name}}" required>

<select name="category_id" required>
{% for cat in categories %}
<option value="{{cat.id}}"
{% if cat.id==product.category_id %}selected{% endif %}>
{{cat.name}}
</option>
{% endfor %}
</select>

<select name="subcategory_id" required>
{% for sub in subcategories %}
<option value="{{sub.id}}"
{% if sub.id==product.subcategory_id %}selected{% endif %}>
{{sub.name}}
</option>
{% endfor %}
</select>

{% if product.sizes %}

<h3>Sizes</h3>

<div class="size-box">

{% for s in product.sizes %}

<div>

<b>{{s.size}}</b>

<input type="hidden"
name="sizes[]"
value="{{s.size}}">

<input type="number"
name="price_{{s.size}}"
value="{{s.price}}"
placeholder="Price">

<input type="number"
name="qty_{{s.size}}"
value="{{s.quantity}}"
placeholder="Qty">

</div>

{% endfor %}

</div>

{% else %}

<input type="number"
name="price"
value="{{product.price}}"
placeholder="Price">

<input type="number"
name="quantity"
value="{{product.quantity}}"
placeholder="Qty">

{% endif %}

<textarea name="description">
{{product.description}}
</textarea>

<label>
<input type="checkbox"
name="show_home"
{% if product.show_home==1 %}checked{% endif %}>
Show Home
</label>

<h3>Current Images</h3>

<div class="image-wrap">

{% for img in product.images %}
<div class="image-box">

<img src="{{url_for('static',filename=img.image)}}">

<label>
<input type="checkbox"
name="delete_images"
value="{{img.image}}">
Delete
</label>

</div>
{% endfor %}

</div>

<h3>Add New Images</h3>

<input type="file"
name="images"
multiple
accept="image/*">

<br><br>

<button type="submit">
Update Product
</button>

</form>

</div>

</body>
</html>
