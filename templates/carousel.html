<!DOCTYPE html>
<html>

<head>
    <title>Carousel Management</title>

    <style>
        body {
            font-family: Arial;
            background: #f5f7fb;
        }

        .container {
            width: 90%;
            margin: auto;
        }

        h2 {
            margin-top: 20px;
        }

        .form-box {
            background: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            margin-top: 20px;
        }

        input,
        textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            padding: 10px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        .cards {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-top: 30px;
        }

        .card {
            width: 250px;
            background: #fff;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .card img {
            width: 100%;
            height: 150px;
            object-fit: cover;
        }

        .card-body {
            padding: 10px;
            text-align: center;
        }

        .delete-btn {
            background: #f44336;
            margin-top: 10px;
        }
    </style>
</head>

<body>

    <div class="container">

        <div style="display:flex; align-items:center; gap:10px; margin-top:20px;">

            <a href="/admin/dashboard"
                style="text-decoration:none; background:#6c757d; color:#fff; padding:8px 14px; border-radius:8px; font-size:14px;">
                ← Back
            </a>

            <h2 style="margin:0;">Carousel Management</h2>

        </div>

        <!-- ADD FORM -->
        <div class="form-box">
            <form method="POST" action="/add-carousel" enctype="multipart/form-data">

                <textarea name="description" placeholder="Enter Description" required></textarea>

                <input type="file" name="image" required>

                <button type="submit">Add Carousel</button>

            </form>
        </div>

        <!-- PREVIEW -->
<div class="cards">

    {% for item in data %}
    <div class="card">

        <img src="{{ url_for('static', filename=item.image) }}">

        <div class="card-body">
            <p>{{ item.description }}</p>

            <a href="/delete-carousel/{{ item.id }}" onclick="return confirm('Delete this item?')">
                <button class="delete-btn">Delete</button>
            </a>
        </div>

    </div>
    {% endfor %}

</div>

    </div>

</body>

</html>
