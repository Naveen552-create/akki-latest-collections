<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#1b8f4b,#4ddf8f);
}

/* LOGIN BOX */
.login-box{
    background:white;
    padding:30px;
    border-radius:12px;
    width:320px;
    box-shadow:0 8px 25px rgba(0,0,0,0.2);
    text-align:center;
}

.login-box h2{
    margin-bottom:20px;
    color:#1b8f4b;
}

/* INPUT */
.login-box input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ddd;
    border-radius:8px;
    outline:none;
}

/* BUTTON */
.login-box button{
    width:100%;
    padding:12px;
    background:#1b8f4b;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:15px;
}

.login-box button:hover{
    background:#157a3e;
}

/* ERROR */
.error{
    color:red;
    font-size:13px;
    margin-top:5px;
}

</style>
</head>

<body>

<form method="POST" class="login-box">
    <h2>Admin Login</h2>

    <input type="text" name="username" placeholder="Username" required>
    <input type="password" name="password" placeholder="Password" required>

    <button type="submit">Login</button>

    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}
</form>

</body>
</html>
